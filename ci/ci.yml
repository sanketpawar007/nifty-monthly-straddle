name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-python:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --user -r requirements.txt

      - name: Syntax check all Python files
        run: python -m py_compile main.py costs_model.py $(find . -name "*.py" -not -path "./.venv/*" -not -path "./backtest/*")

      - name: Import smoke test (no live API)
        env:
          KITE_API_KEY: dummy
          DRY_RUN: "true"
        run: |
          python - <<'EOF'
          from config.settings import settings
          from config.holidays import is_trading_day, next_trading_day
          from strategy.expiry_calendar import monthly_expiry_for, prev_monthly_expiry_for, build_cycle, round_half_up
          from strategy.position import CycleState, IronFlyPosition, Leg
          from state.trade_state import TradeState
          from notifications.telegram import Telegram
          from utils.logger import get_logger
          from costs_model import entry_cost_rs, spread_exit_cost_rs

          # Spot-check expiry rules
          from datetime import date
          assert monthly_expiry_for(2025, 8).weekday() == 3, "Aug 2025 should be Thursday"
          assert monthly_expiry_for(2025, 9).weekday() == 1, "Sep 2025+ should be Tuesday"
          assert round_half_up(24823, 50) == 24850
          assert round_half_up(24825, 50) == 24850

          print("All smoke tests passed.")
          EOF

  lint-go:
    name: Go build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build autologin binary
        run: go build -o /tmp/zerodha_autologin ./cmd/zerodha_autologin/

      - name: Verify binary exists
        run: test -f /tmp/zerodha_autologin
