name: Deploy to VM

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm deployment"
        required: true
        default: ""

jobs:
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            cd ~/nifty-monthly-ironfly
            git fetch origin main
            git reset --hard origin/main
            echo "Code updated."
          ENDSSH

      - name: Build Go binary on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            cd ~/nifty-monthly-ironfly
            make build
            echo "Binary built."
          ENDSSH

      - name: Install Python dependencies on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            cd ~/nifty-monthly-ironfly
            pip3 install --user -r requirements.txt
          ENDSSH

      - name: Restart bot service on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            sudo systemctl restart nifty_iron_fly
            sleep 3
            sudo systemctl status nifty_iron_fly --no-pager
          ENDSSH
